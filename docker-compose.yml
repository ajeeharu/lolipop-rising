services:
  # フロントエンド (React + Tailwind)
  frontend:
    build: ./frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - db
  # バックエンド (PHP)
  backend:
    build: ./backend
    volumes:
      - ./backend:/var/www/html
    ports:
      - "8080:80" # ブラウザからは 8080 でアクセス
    depends_on:
      - db
  # データベース (MySQL)
  db:
    image: mysql:8.0
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_DATABASE: my_database
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_USER: user
      MYSQL_PASSWORD: user_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql # これを追加
volumes:
  mysql_data: